# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_mocha"

add_newline = false
# A minimal left prompt
# format = """$directory$character"""
# right_format = """$all"""

# This format string effectively "disables" everything else by omission.
format = """
$directory\
$git_branch\
$git_status\
\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$env_var\
$crystal\
$custom\
\
$character"""
# move the rest of the prompt to the right
# right_format does not work on bash
#right_format = """$all_modules"""
command_timeout = 1000

# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
#success_symbol = "[[󰄛](green) ❯](peach)"
#error_symbol = "[[󰄛](red) ❯](peach)"
#vimcmd_symbol = "[󰄛 ❮](subtext1)" # For use with zsh-vi-mode
vicmd_symbol = "[N] >>>"
success_symbol = '[➜](bold green)'

[directory]
read_only = " 󰌾"
truncation_length = 4

[aws]
format = "[$symbol$version]($style) "
symbol = " "

[buf]
format = "[$symbol$version]($style) "
symbol = " "

[bun]
format = "[$symbol$version]($style) "
symbol = " "

[c]
format = "[$symbol$version]($style) "
symbol = " "

[cpp]
format = "[$symbol$version]($style) "
symbol = " "

[cmake]
