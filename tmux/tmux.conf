unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-s

# Fix Colors
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on
set-option -g status-position top
set-window-option -g mode-keys vi

# Start selecting text with 'v' (just like visual mode in Vim)
bind -T copy-mode-vi v send-keys -X begin-selection

# Copy text with 'y' and pipe it directly to the Mac system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Optional: Also copy to macOS clipboard if you just highlight and drag with a mouse
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# Move around panes with VIM keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Bind split to - and =
# Unbind the default split keys so they don't get in the way
unbind '"'
unbind %

# Split horizontally (top/bottom) using '-'
# The -c "#{pane_current_path}" ensures the new pane opens in your current directory
bind - split-window -v -c "#{pane_current_path}"

# Split vertically (left/right) using '='
bind = split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_status_background 'default'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

set -g status-bg default

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
